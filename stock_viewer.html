<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>个股三维深度分析 · 动态报告</title>
<style>
:root{--red:#e23b3b;--green:#1faa59;--bg:#f5f7fa;--card:#fff;--ink:#1f2733;--sub:#6b7785;--line:#e8edf2;--brand:#2b5ce6;--brand2:#15b8a6;--amber:#f5a623;--shadow:0 2px 14px rgba(20,40,80,.06)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.65;padding:26px 16px 60px;-webkit-font-smoothing:antialiased}
.wrap{max-width:1080px;margin:0 auto}
.up{color:var(--red);font-weight:600}.down{color:var(--green);font-weight:600}.muted{color:var(--sub);font-size:13px}
.hero{background:linear-gradient(120deg,#1b2a4e,#284b8c 55%,#2b5ce6);color:#fff;border-radius:18px;padding:26px 30px;box-shadow:var(--shadow);margin-bottom:0;position:relative;overflow:hidden}
.hero:after{content:"";position:absolute;right:-60px;top:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(255,255,255,.12),transparent 70%);border-radius:50%}
.hero .tag{display:inline-block;background:rgba(255,255,255,.16);padding:3px 11px;border-radius:20px;font-size:12px}
.hero h1{font-size:27px;margin:10px 0 4px}.hero .code{opacity:.85;font-size:14px}
.hero .price{font-size:42px;font-weight:800;margin-top:12px}
.hero .chg{font-size:16px;margin-left:10px}
.hero .meta{display:flex;flex-wrap:wrap;gap:22px;margin-top:16px;font-size:13.5px;opacity:.95}
.hero .meta b{display:block;font-size:17px;font-weight:700;margin-top:2px}.hero .meta span{opacity:.78}
.disclaim{margin-top:14px;font-size:12px;opacity:.8;border-top:1px solid rgba(255,255,255,.2);padding-top:10px}
.sec{background:var(--card);border-radius:16px;padding:22px 26px;margin-top:20px;box-shadow:var(--shadow)}
.sec h2{font-size:19px;display:flex;align-items:center;gap:9px;margin-bottom:6px}.sec h2 .dot{width:9px;height:22px;border-radius:5px;background:var(--brand)}
.sec .lead{color:var(--sub);font-size:13px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}@media(max-width:820px){.grid3{grid-template-columns:1fr}}
.kpi{background:#fafbfd;border:1px solid var(--line);border-radius:12px;padding:13px 14px}
.kpi .lab{font-size:12.5px;color:var(--sub)}.kpi .val{font-size:21px;font-weight:750;margin-top:3px}.kpi .sub{font-size:12px;margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
th,td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--line)}th:first-child,td:first-child{text-align:left}
thead th{color:var(--sub);font-weight:600;background:#fafbfd}
.range{background:linear-gradient(120deg,#eef4ff,#f3fbff);border-radius:14px;padding:18px 20px;border:1px solid #e1ecff}
.range .calc{font-size:13px;color:#33415c;line-height:1.9}.range .calc code{background:#fff;padding:1px 7px;border-radius:5px;border:1px solid #d8e3f5;font-size:12.5px}
.priceline{position:relative;height:54px;margin:18px 0 6px}
.priceline .track{position:absolute;top:24px;left:0;right:0;height:8px;border-radius:6px;background:linear-gradient(90deg,#cfe0ff,#2b5ce6 50%,#9ec6ff)}
.priceline .cur{position:absolute;top:6px;transform:translateX(-50%);text-align:center}
.priceline .cur b{color:var(--brand);font-size:14px}.priceline .cur small{display:block;color:var(--sub);font-size:11px}
.priceline .rng{position:absolute;top:18px;border-top:2px dashed #fff;color:#fff;font-size:11px;padding:0 6px}
.note{background:#fffaf0;border:1px solid #f3e3c0;border-radius:12px;padding:14px 18px;font-size:13px;color:#7a5c12;margin-top:14px}
footer{text-align:center;color:var(--sub);font-size:12px;margin-top:26px;line-height:1.7}
.pill{display:inline-block;font-size:11.5px;padding:2px 9px;border-radius:20px;background:#eef1f5;color:var(--sub);margin:2px 3px}
#btnRefresh{background:var(--brand);color:#fff;border:none;padding:9px 18px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(43,92,230,.3);transition:.2s}
#btnRefresh:hover{background:#1f49c4}#btnRefresh:disabled{background:#9fb2e0;cursor:wait}
.loading{text-align:center;padding:80px 20px;font-size:16px;color:var(--sub)}.loading .spinner{display:inline-block;width:36px;height:36px;border:4px solid var(--line);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.back-home{position:absolute;top:16px;right:18px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.4);color:#fff;padding:7px 14px;border-radius:24px;font-size:13px;font-weight:600;text-decoration:none;transition:.18s;z-index:3}
.back-home:hover{background:#fff;color:#1b2a4e}
.back-foot{display:inline-block;margin-top:4px;color:var(--brand);font-size:13px;font-weight:600;text-decoration:none;border:1px solid var(--line);padding:8px 18px;border-radius:24px;transition:.18s}
.back-foot:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
.news-list{margin-top:14px;border-top:1px dashed var(--line);padding-top:12px}
.news-list .ni{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f1f4f8;font-size:13.5px}
.news-list .ni .badge{flex:0 0 auto;font-size:11px;padding:2px 8px;border-radius:6px;height:fit-content;margin-top:2px}
.b-pos{background:#fdeaea;color:var(--red)}
.b-neu{background:#eef1f5;color:var(--sub)}
.b-neg{background:#e7f6ee;color:var(--green)}
.news-list .ni .tx small{color:var(--sub);margin-left:6px}
</style></head><body><div class="wrap" id="app"><div class="loading" id="loading"><div class="spinner"></div><div>正在拉取 <span id="loadCode"></span> 实时数据…</div></div></div>
<script>
// ====== 读参数 ======
var params=new URLSearchParams(location.search);
var CODE=params.get('code')||'601138', MARKET=params.get('market')||'SH';
var SECID=(MARKET==='SH'?'1.':'0.')+CODE;
document.getElementById('loadCode').textContent=CODE+'.'+MARKET;

// ====== JSONP ======
function jsonp(url,cbName,timeout){return new Promise(function(resolve,reject){var s=document.createElement('script');var done=false;var timer=setTimeout(function(){if(!done){done=true;if(s.parentNode)s.parentNode.removeChild(s);reject(new Error('timeout'));}},timeout||9000);window[cbName]=function(data){if(done)return;done=true;clearTimeout(timer);if(s.parentNode)s.parentNode.removeChild(s);resolve(data);};s.onerror=function(){if(done)return;done=true;clearTimeout(timer);reject(new Error('load error'));};s.src=url+(url.indexOf('?')>=0?'&':'?')+'cb='+cbName;document.body.appendChild(s);});}
function fmtCap(v){return v>=1e12?(v/1e12).toFixed(2)+'万亿':(v/1e8).toFixed(1)+'亿';}
function fmtPct(v){return (v>=0?'+':'')+v.toFixed(2);}
function cls(v){return v>=0?'up':'down';}
function sign(v){return v>=0?'+':'';}

// ====== 主渲染 ======
async function loadReport(){
  var app=document.getElementById('app');
  var qp='https://push2.eastmoney.com/api/qt/stock/get?secid='+SECID+'&fields=f43,f44,f45,f46,f47,f48,f57,f58,f60,f116,f162,f167,f168,f171,f173';
  var fp='https://push2his.eastmoney.com/api/qt/stock/fflow/kline/get?lmt=10&klt=101&secid='+SECID+'&fields1=f1,f2,f3&fields2=f51,f52,f53,f54,f55,f56';
  var r=await Promise.allSettled([jsonp(qp,'_rq'+Date.now()), jsonp(fp,'_rf'+Date.now())]);
  var qd=r[0].value&&r[0].value.data, kl=r[1].value&&r[1].value.data&&r[1].value.data.klines;
  if(!qd){app.innerHTML='<div class="sec" style="text-align:center;padding:60px"><h2>❌ 未能获取到股票数据</h2><p class="muted" style="margin-top:10px">请检查股票代码 '+CODE+' 是否正确，或稍后重试。</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;border:none;border-radius:8px;background:var(--brand);color:#fff;font-size:14px;cursor:pointer">重新加载</button></div>';return;}

  var p=qd.f43/100, pc=qd.f60/100, cg=p-pc, pt=cg/pc*100, u=cg>=0;
  var a=u?'▲':'▼', sg=u?'+':'';
  var pe=qd.f162/100, pb=qd.f167/100, mcap=qd.f116, peStr=pe.toFixed(1), pbStr=pb.toFixed(2);
  var mcapStr=fmtCap(mcap);
  var eps=(pe>0?p/pe:0).toFixed(2);
  var estNet=pe>0?(mcap/pe/1e8).toFixed(1):'N/A';

  // Flow calc
  var mainVals=[], klineData=[];
  if(kl){kl.forEach(function(line,i){var parts=line.split(',');var mv=parseFloat(parts[1])/1e8;mainVals.push(mv);klineData.push({date:parts[0],main:mv,small:parseFloat(parts[2])/1e8,medium:parseFloat(parts[3])/1e8,superLarge:parseFloat(parts[4])/1e8,large:parseFloat(parts[5])/1e8});});}
  var f10=mainVals.length?mainVals.reduce(function(a,b){return a+b;},0):0;
  var f5=mainVals.length>=5?mainVals.slice(-5).reduce(function(a,b){return a+b;},0):0;
  var today=klineData.length?klineData[klineData.length-1]:null;

  // Price range
  var lowPE=25, highPE=40;
  var el=eps>0?(parseFloat(eps)*lowPE).toFixed(0):'N/A';
  var eh=eps>0?(parseFloat(eps)*highPE).toFixed(0):'N/A';
  var posPct=el!='N/A'&&eh!='N/A'?Math.min(100,Math.max(0,((p-el)/(eh-el)*100))):50;
  var posLabel=posPct<33?'偏低区':posPct<66?'中枢区':'偏高区';

  // Build flow table (reverse)
  var flowRows='';
  klineData.slice().reverse().forEach(function(d){flowRows+='<tr><td>'+d.date+'</td><td class="'+cls(d.main)+'">'+sign(d.main)+d.main.toFixed(2)+'</td><td class="'+cls(d.superLarge)+'">'+sign(d.superLarge)+d.superLarge.toFixed(2)+'</td><td class="'+cls(d.large)+'">'+sign(d.large)+d.large.toFixed(2)+'</td><td class="'+cls(d.medium)+'">'+sign(d.medium)+d.medium.toFixed(2)+'</td><td class="'+cls(d.small)+'">'+sign(d.small)+d.small.toFixed(2)+'</td></tr>';});

  var now=new Date(); var p2=function(x){return String(x).padStart(2,'0');};
  var ts=now.getFullYear()+'-'+p2(now.getMonth()+1)+'-'+p2(now.getDate())+' '+p2(now.getHours())+':'+p2(now.getMinutes());

  app.innerHTML=
  '<div class="hero"><a class="back-home" href="./index.html" title="返回看板首页">← 返回主页</a><span class="tag">个股三维深度分析 · '+CODE+'.'+MARKET+'</span>'+
    '<h1>'+qd.f58+' <span style="font-weight:500;font-size:16px;opacity:.7">动态生成</span></h1>'+
    '<div class="code">代码 '+CODE+'.'+MARKET+' ｜ 动态报告 ｜ 数据实时获取</div>'+
    '<div class="price">¥'+p.toFixed(2)+' <span class="chg '+cls(cg)+'">'+a+' '+sg+cg.toFixed(2)+' ('+sg+pt.toFixed(2)+'%)</span></div>'+
    '<div class="meta"><div><span>总市值</span><b>'+mcapStr+'</b></div><div><span>市盈率(动)</span><b>'+peStr+'</b></div><div><span>市净率</span><b>'+pbStr+'</b></div></div>'+
    '<div class="disclaim">⚠️ 本报告基于公开数据实时生成，不构成投资建议。财务数据为估算值，精确数据请查阅公司公告。</div></div>'+

  '<div class="sec" style="margin-top:20px;padding:14px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">'+
    '<button id="btnRefresh" onclick="location.reload()">🔄 刷新实时数据</button>'+
    '<span class="muted">点击刷新重新拉取行情与资金流（财务数据为实时估算）</span>'+
    '<span class="pill" style="margin-left:auto">最后更新：'+ts+'</span></div>'+

  '<div class="sec"><h2><span class="dot"></span>实时行情概览</h2>'+
  '<div class="grid3">'+
    '<div class="kpi"><div class="lab">最新价</div><div class="val '+(u?'up':'down')+'">¥'+p.toFixed(2)+'</div><div class="sub '+(u?'up':'down')+'">'+(u?'涨':'跌')+' '+Math.abs(cg).toFixed(2)+' 元</div></div>'+
    '<div class="kpi"><div class="lab">总市值</div><div class="val">'+mcapStr+'</div><div class="sub">PE(动) '+peStr+'x</div></div>'+
    '<div class="kpi"><div class="lab">每股收益(EPS)</div><div class="val">¥'+eps+'</div><div class="sub">估算净利润 '+estNet+(estNet!='N/A'?' 亿':'')+'</div></div>'+
  '</div><div class="note" style="background:#eef6ff;border-color:#cfe0ff;color:#1f4f9e">📌 EPS 及净利润基于 PE 反推估算，非财报精确值。</div></div>'+

  '<div class="sec"><h2><span class="dot"></span>资金面 · 主力净流入</h2>'+
  '<div class="lead">来自东方财富资金流 API，单位：亿元。</div>'+
  '<div class="grid3" style="margin-bottom:16px">'+
    '<div class="kpi"><div class="lab">今日主力净流入</div><div class="val '+(today?cls(today.main):'')+'">'+(today?sign(today.main)+today.main.toFixed(2):'-')+'</div><div class="sub '+(today?cls(today.main):'')+'">超大单 '+(today?sign(today.superLarge)+today.superLarge.toFixed(2):'-')+' ｜ 大单 '+(today?sign(today.large)+today.large.toFixed(2):'-')+'</div></div>'+
    '<div class="kpi"><div class="lab">近 5 日主力净流入</div><div class="val '+(f5>=0?'up':'down')+'">'+(f5>=0?'+':'')+f5.toFixed(2)+'</div></div>'+
    '<div class="kpi"><div class="lab">近 10 日主力净流入</div><div class="val '+(f10>=0?'up':'down')+'">'+(f10>=0?'+':'')+f10.toFixed(2)+'</div></div>'+
  '</div>'+
  '<h3 style="font-size:14px;margin-bottom:6px;color:#33415c">近 10 个交易日主力净流入（亿元）</h3>'+
  '<table><thead><tr><th>日期</th><th>主力</th><th>超大单</th><th>大单</th><th>中单</th><th>小单</th></tr></thead><tbody>'+flowRows+'</tbody></table>'+
  '<div class="note">📌 资金流数据实时获取，精确至最新交易日。</div></div>'+

  '<div class="sec"><h2><span class="dot" style="background:var(--amber)"></span>合理价格区间参考</h2>'+
  '<div class="range"><div class="calc"><b>测算假设（基于实时PE反推）：</b><br>① EPS ≈ <code>¥'+eps+'</code>（现价/PE反推）<br>② 给予 '+lowPE+'–'+highPE+' 倍 PE 区间<br>③ 合理价 = <b style="color:var(--brand)">¥'+el+' ~ ¥'+eh+'</b></div>'+
  '<div class="priceline"><div class="track"></div><div class="rng" style="left:8%">¥'+el+'<br>保守</div><div class="rng" style="left:60%">¥'+eh+'<br>乐观</div><div class="cur" style="left:'+posPct+'%"><b>¥'+p.toFixed(2)+'</b><small>当前价（'+posLabel+'）</small></div></div>'+
  '<div style="text-align:center;font-size:12.5px;color:#33415c">估值区间：<b style="color:var(--brand)">¥'+el+' — ¥'+eh+'</b> ｜ 当前价 ¥'+p.toFixed(2)+'</div></div>'+
  '<div class="note" style="background:#fff4f4;border-color:#f3c9c9;color:#a33636">⚠️ 上述区间为基于实时PE的快速估算，不构成目标价。</div></div>'+

  '<div class="sec"><h2><span class="dot" style="background:var(--amber)"></span>风险提示</h2>'+
  '<ul class="risk" style="font-size:13px;color:#5a4632;line-height:1.85;list-style:none;padding:0">'+
    '<li style="margin-bottom:8px">⚠️ <b>数据局限性</b>：本报告为动态生成，财务数据（营收/净利润/ROE等）为基于PE反推的估算值，非公司公告精确数据。</li>'+
    '<li style="margin-bottom:8px">⚠️ <b>资金面波动</b>：近10日主力净流入 '+fmtPct(f10)+' 亿，短线仍有波动风险。</li>'+
    '<li style="margin-bottom:8px">⚠️ <b>不构成投资建议</b>：本报告仅供研究学习参考，不构成任何证券买卖建议。投资决策请结合自身风险承受能力。</li>'+
  '</ul></div>'+

  '<div id="newsSlot"></div>'+
  '<div style="text-align:center;margin-top:24px"><a class="back-foot" href="./index.html">← 返回主页看板</a></div>'+
  '<footer>'+qd.f58+'（'+CODE+'.'+MARKET+'）个股动态分析报告 ｜ 生成时间 '+ts+'<br>数据来源：东方财富行情/资金流API ｜ 涨跌色按 A 股习惯（涨红跌绿）<br>⚠️ 本报告仅供研究参考，不构成投资建议。</footer>';

  // Update page title
  document.title=qd.f58+'('+CODE+') 动态分析报告';

  // 新闻板块：匹配 news_data.json 中对应代码，有则渲染，无则给提示
  (function renderNews(){
    var slot=document.getElementById('newsSlot');
    if(!slot) return;
    var head='<div class="sec"><h2><span class="dot" style="background:var(--brand2)"></span>最新一周动态与关键新闻分析</h2>';
    fetch('./news_data.json').then(function(r){return r.json();}).then(function(nd){
      var d=nd[CODE];
      if(!d){ slot.innerHTML=head+'<div class="lead">该股票暂无整理好的新闻板块。可在仓库根目录的 news_data.json 中按代码补充 summary 与 items 后查看。</div></div>'; return; }
      var html=head+'<div class="lead">本周综述与关键新闻来自 news_data.json（公开新闻检索整理，仅供研究参考）。</div>';
      if(d.summary){ html+='<div style="font-size:14px;line-height:1.8;margin-bottom:6px"><b>本周综述：</b>'+d.summary+'</div>'; }
      html+='<div class="news-list">';
      (d.items||[]).forEach(function(it){
        var map={'pos':'利好','neu':'中性','neg':'利空'}, cls={'pos':'b-pos','neu':'b-neu','neg':'b-neg'};
        var lab=map[it.sentiment]||'中性', bc=cls[it.sentiment]||'b-neu';
        html+='<div class="ni"><span class="badge '+bc+'">'+lab+'</span><div class="tx"><b>'+it.title+'</b><small>'+(it.date?(' '+it.date):'')+'</small><br>'+(it.analysis||'')+'</div></div>';
      });
      html+='</div></div>';
      slot.innerHTML=html;
    }).catch(function(){ slot.innerHTML=head+'<div class="lead">未能加载 news_data.json（若以本地文件方式打开可能受浏览器同源限制）。通过服务器（如 GitHub Pages）访问即可正常显示。</div></div>'; });
  })();
}

loadReport();
</script></body></html>
